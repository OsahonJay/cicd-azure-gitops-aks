apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: microservices
  labels:
    app: python-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      # Dedicated ServiceAccount with no token auto-mount.
      # Reason: the default SA token gives any pod the ability to query the
      # K8s API. These microservices do not need cluster API access.
      serviceAccountName: python-app-sa
      automountServiceAccountToken: false

      # Pod-level security context.
      # runAsNonRoot: K8s enforces the image must not start as UID 0.
      # seccompProfile RuntimeDefault: applies the container runtime's
      # default syscall filter, blocking ~45 dangerous syscalls.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: python-app
          # Tag is updated by the CD pipeline on every successful CI build.
          # 'latest' is never used — it is mutable and defeats ArgoCD drift detection.
          image: acrgitopsproject2.azurecr.io/python-app:17
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

          # Container-level security context.
          # allowPrivilegeEscalation: false — prevents setuid/setgid escalation.
          # readOnlyRootFilesystem: true — any write attempt outside mounted
          # volumes raises an error; limits persistence if container is compromised.
          # drop ALL capabilities: container starts with zero Linux capabilities.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            # gunicorn writes to /tmp for worker temp files.
            # emptyDir is ephemeral, node-local, and wiped on pod deletion.
            - name: tmp-dir
              mountPath: /tmp

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

      volumes:
        - name: tmp-dir
          emptyDir: {}
