# kube-prometheus-stack values tuned for a single-node Standard_D2ps_v6 AKS cluster.
# Install / upgrade:
#   helm upgrade --install kube-prometheus-stack \
#     prometheus-community/kube-prometheus-stack \
#     -n monitoring -f k8s/monitoring/helm-values.yaml

grafana:
  service:
    type: LoadBalancer
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  adminPassword: "admin"
  grafana.ini:
    auth.anonymous:
      enabled: false

prometheus:
  prometheusSpec:
    retention: 12h
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    # Scrape our microservices namespace
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "128Mi"
        cpu: "100m"

kube-state-metrics:
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "128Mi"
      cpu: "100m"

prometheus-node-exporter:
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"
