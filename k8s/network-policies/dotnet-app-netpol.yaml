apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dotnet-app-ingress
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: dotnet-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
