apiVersion: v1
kind: ResourceQuota
metadata:
  name: microservices-quota
  namespace: microservices
spec:
  hard:
    requests.cpu: "900m"      
    requests.memory: "896Mi"  
    limits.cpu: "3"          
    limits.memory: "1536Mi"  
    count/pods: "20"        
    count/services: "10"
    count/deployments.apps: "10"
    count/secrets: "20"     
    count/configmaps: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: microservices-limits
  namespace: microservices
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "128Mi"
      defaultRequest:
        cpu: "100m"
        memory: "64Mi"
      max:
        cpu: "500m"
        memory: "512Mi"
      min:
        cpu: "50m"
        memory: "32Mi"
    - type: Pod
      max:
        cpu: "1"
        memory: "1Gi"
