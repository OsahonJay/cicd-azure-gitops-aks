apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: microservices
  annotations:
    # Strip the path prefix before forwarding to the backend service.
    # /python/health  → /health on python-app-svc
    # /nodejs/api/data → /api/data on nodejs-app-svc
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /python(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: python-app-svc
                port:
                  number: 80
          - path: /nodejs(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: nodejs-app-svc
                port:
                  number: 80
          - path: /dotnet(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dotnet-app-svc
                port:
                  number: 80
