trigger:
  branches:
    include:
      - main
  paths:
    include:
      - microservices/**
      - k8s/**
      - azure-pipelines/**

variables:
  ACR_NAME: "acrgitopsproject"
  ACR_LOGIN_SERVER: "$(ACR_NAME).azurecr.io"
  # IMAGE_TAG uses the pipeline run ID — immutable, traceable, never 'latest'.
  # Reason: mutable tags (latest, stable) defeat ArgoCD drift detection and
  # make rollbacks ambiguous. Build ID ties every running container to an
  # auditable pipeline execution.
  IMAGE_TAG: "$(Build.BuildId)"

stages:

  # ============================================================
  # GATE 1 — Secret Scanning (Gitleaks)
  # Scans the full git history for accidentally committed secrets.
  # continueOnError: true so downstream stages run even if secrets
  # are found; findings are published as a SARIF artifact for review.
  # In production, remove continueOnError to enforce blocking.
  # ============================================================
  - stage: SecretScan
    displayName: "Gate 1 — Secret Scanning (Gitleaks)"
    jobs:
      - job: Gitleaks
        displayName: "Scan for committed secrets"
        continueOnError: true
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
            fetchDepth: 0   # full history — Gitleaks scans all commits, not just HEAD

          - script: |
              # gitleaks exits 1 when secrets are found, 0 when clean.
              # We capture the exit code and publish the report regardless;
              # the job is marked continueOnError so the stage passes either way.
              docker run --rm \
                -v "$(Build.SourcesDirectory):/repo" \
                ghcr.io/gitleaks/gitleaks:v8.18.4 \
                detect \
                  --source /repo \
                  --redact \
                  --exit-code 1 \
                  --report-format sarif \
                  --report-path /repo/gitleaks-report.sarif \
                2>&1 | tee gitleaks-output.txt || true
              echo "Gitleaks scan complete — review artifact for findings"
            displayName: "Run Gitleaks — report secrets (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/gitleaks-report.sarif"
              artifactName: "secret-scan-results"

  # ============================================================
  # GATE 2 — IaC Scanning (Checkov)
  # Scans Kubernetes manifests for misconfigurations.
  # Uses --soft-fail so results are reported but do not block.
  # Fix: Checkov writes SARIF to a results/ subdirectory when using
  # --output-file-path, not directly to the path as a filename.
  # We specify the exact output filename instead.
  # ============================================================
  - stage: IaCScan
    displayName: "Gate 2 — IaC Scanning (Checkov)"
    dependsOn: SecretScan
    jobs:
      - job: Checkov
        displayName: "Scan K8s manifests for misconfigurations"
        continueOnError: true
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - script: |
              pip install checkov==3.2.0 --quiet
            displayName: "Install Checkov (pinned version)"

          - script: |
              # --soft-fail: Checkov reports all findings but exits 0.
              # This ensures the artifact is always published and the pipeline
              # progresses to the build stage.
              # --output-file-path $(Build.SourcesDirectory) writes the SARIF as
              # results_kubernetes.sarif in the source directory.
              # Findings are visible in the published SARIF artifact for review.
              checkov \
                --directory k8s/ \
                --framework kubernetes \
                --output cli \
                --output sarif \
                --output-file-path "$(Build.SourcesDirectory)" \
                --soft-fail || true
              echo "Checkov scan complete — review artifact for findings"
            displayName: "Scan k8s/ — report misconfigs (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/results_kubernetes.sarif"
              artifactName: "iac-scan-results"

  # ============================================================
  # GATE 3 — Static Application Security Testing (Semgrep)
  # Scans application source code for insecure patterns.
  # Uses --error with continueOnError: true — findings are captured
  # as a SARIF artifact but do not block the build stage.
  # ============================================================
  - stage: SAST
    displayName: "Gate 3 — SAST (Semgrep)"
    dependsOn: SecretScan
    jobs:
      - job: Semgrep
        displayName: "Scan microservice source code"
        continueOnError: true
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - script: |
              pip install semgrep==1.72.0 --quiet
            displayName: "Install Semgrep (pinned version)"

          - script: |
              # Run Semgrep with auto config; write SARIF report.
              # --error causes exit 1 on findings; job continueOnError
              # ensures the pipeline progresses regardless.
              semgrep \
                --config=auto \
                microservices/ \
                --sarif \
                --output $(Build.SourcesDirectory)/semgrep-results.sarif \
                2>&1 | tee semgrep-output.txt || true
              echo "Semgrep scan complete — review artifact for findings"
            displayName: "Run Semgrep — report security findings (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/semgrep-results.sarif"
              artifactName: "sast-results"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — Python App
  # All three security gates must complete (pass or soft-fail)
  # before any image is built.
  # Fix: Trivy is installed natively on the agent (not docker-in-docker)
  # so the SARIF output file lands on the agent filesystem correctly.
  # --exit-code 0 ensures unfixed CVEs in base images do not block;
  # all findings are published as a SARIF artifact.
  # ============================================================
  - stage: Build_Python
    displayName: "Build · Scan · Push — python-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushPython
        displayName: "python-app"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t python-app:$(IMAGE_TAG) \
                microservices/python-app/
            displayName: "Build Docker image"

          - script: |
              # Install Trivy natively on the agent — avoids docker-in-docker
              # socket mounts and ensures the SARIF output lands on the agent
              # filesystem where PublishBuildArtifacts can read it.
              TRIVY_VERSION="0.50.4"
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
              trivy --version
            displayName: "Install Trivy (pinned version)"

          - script: |
              # --exit-code 0: scan and report, do not block on unfixed CVEs.
              # --ignore-unfixed: exclude CVEs with no available fix (noise reduction).
              # In production, change --exit-code to 1 to enforce blocking.
              trivy image \
                --exit-code 0 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --format sarif \
                --output $(Build.SourcesDirectory)/trivy-python.sarif \
                python-app:$(IMAGE_TAG)
              echo "Trivy scan complete — review artifact for CVE findings"
            displayName: "Trivy scan — report CVEs (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/trivy-python.sarif"
              artifactName: "trivy-python-results"

          - script: |
              # Push only the immutable build-ID tag. Never push :latest to ACR.
              docker tag python-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)"
            displayName: "Push python-app to ACR"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — Node.js App
  # ============================================================
  - stage: Build_NodeJS
    displayName: "Build · Scan · Push — nodejs-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushNodeJS
        displayName: "nodejs-app"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t nodejs-app:$(IMAGE_TAG) \
                microservices/nodejs-app/
            displayName: "Build Docker image"

          - script: |
              TRIVY_VERSION="0.50.4"
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
            displayName: "Install Trivy (pinned version)"

          - script: |
              trivy image \
                --exit-code 0 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --format sarif \
                --output $(Build.SourcesDirectory)/trivy-nodejs.sarif \
                nodejs-app:$(IMAGE_TAG)
            displayName: "Trivy scan — report CVEs (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/trivy-nodejs.sarif"
              artifactName: "trivy-nodejs-results"

          - script: |
              docker tag nodejs-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)"
            displayName: "Push nodejs-app to ACR"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — .NET App
  # ============================================================
  - stage: Build_DotNet
    displayName: "Build · Scan · Push — dotnet-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushDotNet
        displayName: "dotnet-app"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t dotnet-app:$(IMAGE_TAG) \
                microservices/dotnet-app/
            displayName: "Build Docker image"

          - script: |
              TRIVY_VERSION="0.50.4"
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
            displayName: "Install Trivy (pinned version)"

          - script: |
              trivy image \
                --exit-code 0 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --format sarif \
                --output $(Build.SourcesDirectory)/trivy-dotnet.sarif \
                dotnet-app:$(IMAGE_TAG)
            displayName: "Trivy scan — report CVEs (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/trivy-dotnet.sarif"
              artifactName: "trivy-dotnet-results"

          - script: |
              docker tag dotnet-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)"
            displayName: "Push dotnet-app to ACR"
