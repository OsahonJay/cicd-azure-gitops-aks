          - script: |
              if [ "$(uname -m)" != "aarch64" ]; then
                docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
              else
                echo "ARM64 agent — QEMU not needed for linux/arm64 builds"
              fi
            displayName: "Set up QEMU for ARM64 cross-compilation"

          - script: |
              docker build \
                --platform linux/arm64 \
