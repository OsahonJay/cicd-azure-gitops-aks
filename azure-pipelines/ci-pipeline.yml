  - stage: Build_Frontend
    displayName: "Build · Scan · Push — frontend"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushFrontend
        displayName: "frontend"
        pool:
          name: "Default"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login and build frontend with API key"
            inputs:
              azureSubscription: "AZURE_SERVICE_CONNECTION"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)
                VITE_API_KEY=$(az keyvault secret show \
                  --name api-key \
                  --vault-name kv-gitops-project \
                  --query value -o tsv)
                docker build \
                  --platform linux/arm64 \
                  --build-arg VITE_API_KEY="$VITE_API_KEY" \
                  -t frontend:$(IMAGE_TAG) \
                  microservices/frontend/

          - script: |
              TRIVY_VERSION="0.70.0"
              ARCH=$(uname -m)
