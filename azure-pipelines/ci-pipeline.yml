trigger:
  branches:
    include:
      - main
  paths:
    include:
      - microservices/**
      - k8s/**
      - azure-pipelines/**

variables:
  ACR_NAME: "acrgitopsproject"
  ACR_LOGIN_SERVER: "acrgitopsproject.azurecr.io"
  # IMAGE_TAG uses the pipeline run ID — immutable, traceable, never 'latest'.
  IMAGE_TAG: "$(Build.BuildId)"
  # Service connection name — must match Project Settings → Service Connections.
  # Defined here (not as a UI variable) so AzureCLI@2 can resolve it.
  # Secret UI variables cannot be used as connectedServiceNameARM inputs.
  AZURE_SERVICE_CONNECTION: "AZURE_SERVICE_CONNECTION"

stages:

  # ============================================================
  # GATE 1 — Secret Scanning (Gitleaks)
  # ============================================================
  - stage: SecretScan
    displayName: "Gate 1 — Secret Scanning (Gitleaks)"
    jobs:
      - job: Gitleaks
        displayName: "Scan for committed secrets"
        continueOnError: true
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              docker run --rm \
                -v "$(Build.SourcesDirectory):/repo" \
                ghcr.io/gitleaks/gitleaks:v8.18.4 \
                detect \
                  --source /repo \
                  --redact \
                  --exit-code 1 \
                  --report-format sarif \
                  --report-path /repo/gitleaks-report.sarif \
                2>&1 | tee gitleaks-output.txt
              # '|| true' is NOT used here — if Gitleaks finds real secrets
              # the job is marked 'succeeded with issues' (continueOnError)
              # but the SARIF artifact documents the finding.
              exit 0
            displayName: "Run Gitleaks — report secrets (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/gitleaks-report.sarif"
              artifactName: "secret-scan-results"

  # ============================================================
  # GATE 2 — IaC Scanning (Checkov)
  # Fix: capture SARIF via stdout redirect (> file) instead of
  # --output-file-path which has unreliable behaviour in Checkov 3.x.
  # ============================================================
  - stage: IaCScan
    displayName: "Gate 2 — IaC Scanning (Checkov)"
    dependsOn: SecretScan
    jobs:
      - job: Checkov
        displayName: "Scan K8s manifests for misconfigurations"
        continueOnError: true
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - script: |
              pip install checkov==3.2.0 --quiet
            displayName: "Install Checkov"

          - script: |
              # Print findings to the pipeline log (CLI output)
              checkov \
                --directory k8s/ \
                --framework kubernetes \
                --output cli \
                --soft-fail || true

              # Capture SARIF via stdout redirect — avoids --output-file-path
              # path resolution issues in Checkov 3.x.
              checkov \
                --directory k8s/ \
                --framework kubernetes \
                --output sarif \
                --soft-fail \
                > "$(Build.SourcesDirectory)/checkov-results.sarif" 2>/dev/null || true

              echo "Checkov scan complete"
              ls -la "$(Build.SourcesDirectory)/checkov-results.sarif" 2>/dev/null || echo "SARIF file not created"
            displayName: "Scan k8s/ — report misconfigs (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/checkov-results.sarif"
              artifactName: "iac-scan-results"

  # ============================================================
  # GATE 3 — SAST (Semgrep)
  # ============================================================
  - stage: SAST
    displayName: "Gate 3 — SAST (Semgrep)"
    dependsOn: SecretScan
    jobs:
      - job: Semgrep
        displayName: "Scan microservice source code"
        continueOnError: true
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - script: |
              pip install semgrep==1.72.0 --quiet
            displayName: "Install Semgrep"

          - script: |
              semgrep \
                --config=auto \
                microservices/ \
                --sarif \
                --output "$(Build.SourcesDirectory)/semgrep-results.sarif" \
                2>&1 | tee semgrep-output.txt || true
              echo "Semgrep scan complete"
            displayName: "Run Semgrep — report findings (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/semgrep-results.sarif"
              artifactName: "sast-results"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — Python App
  # Fix: azureSubscription uses the YAML variable (not the secret UI
  # variable) so AzureCLI@2 can resolve connectedServiceNameARM.
  # Trivy is installed natively so its SARIF lands on the agent FS.
  # ============================================================
  - stage: Build_Python
    displayName: "Build · Scan · Push — python-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushPython
        displayName: "python-app"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "AZURE_SERVICE_CONNECTION"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t python-app:$(IMAGE_TAG) \
                microservices/python-app/
            displayName: "Build Docker image"

          - script: |
              TRIVY_VERSION="0.50.4"
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
              trivy --version
            displayName: "Install Trivy"

          - script: |
              trivy image \
                --exit-code 0 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --format sarif \
                --output "$(Build.SourcesDirectory)/trivy-python.sarif" \
                python-app:$(IMAGE_TAG)
              echo "Trivy python-app scan complete"
            displayName: "Trivy CVE scan — python-app (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/trivy-python.sarif"
              artifactName: "trivy-python-results"

          - script: |
              docker tag python-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)"
            displayName: "Push python-app to ACR"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — Node.js App
  # ============================================================
  - stage: Build_NodeJS
    displayName: "Build · Scan · Push — nodejs-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushNodeJS
        displayName: "nodejs-app"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "AZURE_SERVICE_CONNECTION"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t nodejs-app:$(IMAGE_TAG) \
                microservices/nodejs-app/
            displayName: "Build Docker image"

          - script: |
              TRIVY_VERSION="0.50.4"
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
            displayName: "Install Trivy"

          - script: |
              trivy image \
                --exit-code 0 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --format sarif \
                --output "$(Build.SourcesDirectory)/trivy-nodejs.sarif" \
                nodejs-app:$(IMAGE_TAG)
            displayName: "Trivy CVE scan — nodejs-app (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/trivy-nodejs.sarif"
              artifactName: "trivy-nodejs-results"

          - script: |
              docker tag nodejs-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)"
            displayName: "Push nodejs-app to ACR"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — .NET App
  # ============================================================
  - stage: Build_DotNet
    displayName: "Build · Scan · Push — dotnet-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushDotNet
        displayName: "dotnet-app"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "AZURE_SERVICE_CONNECTION"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t dotnet-app:$(IMAGE_TAG) \
                microservices/dotnet-app/
            displayName: "Build Docker image"

          - script: |
              TRIVY_VERSION="0.50.4"
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
            displayName: "Install Trivy"

          - script: |
              trivy image \
                --exit-code 0 \
                --severity CRITICAL,HIGH \
                --ignore-unfixed \
                --format sarif \
                --output "$(Build.SourcesDirectory)/trivy-dotnet.sarif" \
                dotnet-app:$(IMAGE_TAG)
            displayName: "Trivy CVE scan — dotnet-app (soft-fail)"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/trivy-dotnet.sarif"
              artifactName: "trivy-dotnet-results"

          - script: |
              docker tag dotnet-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)"
            displayName: "Push dotnet-app to ACR"
