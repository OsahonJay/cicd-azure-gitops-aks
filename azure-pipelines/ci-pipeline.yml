              fi
              echo "Downloading Trivy v${TRIVY_VERSION} for ${TRIVY_ARCH}..."
              curl -sSL \
                "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_${TRIVY_ARCH}.tar.gz" \
                | tar -xz -C /usr/local/bin trivy 2>/dev/null \
                || echo "Binary extraction failed — CVE scan will be skipped"
            displayName: "Install Trivy"

          - script: |
              touch "$(Build.SourcesDirectory)/trivy-nodejs.sarif"
              if command -v trivy >/dev/null 2>&1; then
                trivy image \
                  --exit-code 1 \
                  --severity CRITICAL,HIGH \
                  --ignore-unfixed \
                  --format sarif \
                  --output "$(Build.SourcesDirectory)/trivy-nodejs.sarif" \
                  nodejs-app:$(IMAGE_TAG)
              else
                echo "Trivy not available — CVE scan skipped"
              fi
            displayName: "Trivy CVE scan — nodejs-app (soft-fail)"

          - script: |
              docker tag nodejs-app:$(IMAGE_TAG) $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)
              docker push $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)
              echo "Pushed: $(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)"
            displayName: "Push nodejs-app to ACR"

  # ============================================================
  # BUILD + TRIVY SCAN + PUSH — .NET App
  # ============================================================
  - stage: Build_DotNet
    displayName: "Build · Scan · Push — dotnet-app"
    dependsOn:
      - SecretScan
      - IaCScan
      - SAST
    jobs:
      - job: BuildScanPushDotNet
        displayName: "dotnet-app"
        pool:
          name: "Default"
        steps:
          - task: AzureCLI@2
            displayName: "ACR login via Service Principal"
            inputs:
              azureSubscription: "AZURE_SERVICE_CONNECTION"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
