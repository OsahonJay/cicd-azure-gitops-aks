trigger: none

resources:
  pipelines:
    - pipeline: CIPipeline
      source: "cicd-azure-gitops-aks"
      trigger:
        branches:
          include:
            - main

variables:
  ACR_LOGIN_SERVER: "acrgitopsproject.azurecr.io"
  IMAGE_TAG: "$(resources.pipeline.CIPipeline.runID)"
  GIT_USER_EMAIL: "devops-bot@cicd-gitops.com"
  GIT_USER_NAME: "Azure DevOps Bot [bot]"
  KEY_VAULT_NAME: "kv-gitops-project"
  ARGOCD_SERVER: "20.162.177.70"
  AZURE_SERVICE_CONNECTION: "AZURE_SERVICE_CONNECTION"

stages:
  - stage: FetchSecrets
    displayName: "Fetch Runtime Secrets from Key Vault"
    jobs:
      - job: FetchFromKeyVault
        displayName: "Load secrets via Managed Identity"
        pool:
          name: "Default"
        steps:
          - task: AzureKeyVault@2
            displayName: "Fetch secrets — argocd-admin-password, github-pat"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              KeyVaultName: "$(KEY_VAULT_NAME)"
              SecretsFilter: "argocd-admin-password,github-pat"
              RunAsPreJob: true

  - stage: UpdateManifests
    displayName: "Update K8s Manifests"
    dependsOn: FetchSecrets
    jobs:
      - job: UpdateK8sManifests
        displayName: "Patch image tags in deployment manifests"
        pool:
          name: "Default"
        steps:
          - checkout: self
            persistCredentials: true

          - task: AzureKeyVault@2
            displayName: "Re-fetch Key Vault secrets in this job"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              KeyVaultName: "$(KEY_VAULT_NAME)"
              SecretsFilter: "github-pat"
              RunAsPreJob: false

          - script: |
              git config user.email "$(GIT_USER_EMAIL)"
              git config user.name "$(GIT_USER_NAME)"
              git remote set-url origin \
                https://x-access-token:$(github-pat)@github.com/Ayooluwabami/cicd-azure-gitops-aks.git
            displayName: "Configure Git with Key Vault PAT"

          - script: |
              git fetch origin main
              git reset --hard origin/main
            displayName: "Sync local workspace with GitHub HEAD"

          - script: |
              sed -i "s|$(ACR_LOGIN_SERVER)/python-app:.*|$(ACR_LOGIN_SERVER)/python-app:$(IMAGE_TAG)|g" \
                k8s/deployments/python-app-deployment.yaml

              sed -i "s|$(ACR_LOGIN_SERVER)/nodejs-app:.*|$(ACR_LOGIN_SERVER)/nodejs-app:$(IMAGE_TAG)|g" \
                k8s/deployments/nodejs-app-deployment.yaml

              sed -i "s|$(ACR_LOGIN_SERVER)/dotnet-app:.*|$(ACR_LOGIN_SERVER)/dotnet-app:$(IMAGE_TAG)|g" \
                k8s/deployments/dotnet-app-deployment.yaml

              sed -i "s|$(ACR_LOGIN_SERVER)/frontend:.*|$(ACR_LOGIN_SERVER)/frontend:$(IMAGE_TAG)|g" \
                k8s/deployments/frontend-deployment.yaml

              echo "Updated manifests:"
              grep "image:" k8s/deployments/*.yaml
            displayName: "Patch image tags → build $(IMAGE_TAG)"

          - script: |
              git add k8s/deployments/
              if git diff --staged --quiet; then
                echo "No manifest changes — image tags already at $(IMAGE_TAG)"
                exit 0
              fi
              git commit -m "ci(cd): update image tags to build $(IMAGE_TAG) [skip ci]

              Pipeline run: $(Build.BuildId)
              Triggered by: $(Build.RequestedFor)
              Branch: $(Build.SourceBranchName)"
              git push origin HEAD:main
            displayName: "Commit and push manifest changes"

  - stage: SyncArgoCD
    displayName: "ArgoCD Sync + Health Gate"
    dependsOn: UpdateManifests
    jobs:
      - job: ArgoCDSync
        displayName: "Sync application and verify health"
        pool:
          name: "Default"
        steps:
          - task: AzureKeyVault@2
            displayName: "Fetch ArgoCD password from Key Vault"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              KeyVaultName: "$(KEY_VAULT_NAME)"
              SecretsFilter: "argocd-admin-password"
              RunAsPreJob: false

          - script: |
              ARGOCD_VERSION="v3.4.2"
              ARCH=$(uname -m)
              if [ "${ARCH}" = "aarch64" ]; then
                ARGOCD_ARCH="arm64"
              else
                ARGOCD_ARCH="amd64"
              fi
              curl -sSL -o /tmp/argocd \
                "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-${ARGOCD_ARCH}"
              sudo mv /tmp/argocd /usr/local/bin/argocd
              sudo chmod +x /usr/local/bin/argocd
              argocd version --client
            displayName: "Install ArgoCD CLI (pinned v3.4.2)"

          - script: |
              argocd login $(ARGOCD_SERVER) \
                --username admin \
                --password $(argocd-admin-password) \
                --grpc-web

              argocd app sync microservices-app --force --prune
              argocd app wait microservices-app \
                --health \
                --timeout 600
            displayName: "Sync ArgoCD app and wait for healthy status"
            env:
              ARGOCD_SERVER: $(ARGOCD_SERVER)

          - script: |
              echo "=== Deployment summary ==="
              argocd app get microservices-app
            displayName: "Print deployment status"

  - stage: DAST
    displayName: "Gate 4 — DAST (OWASP ZAP)"
    dependsOn: SyncArgoCD
    jobs:
      - job: ZAPScan
        displayName: "Baseline scan — all three services via Ingress"
        continueOnError: true
        pool:
          name: "Default"
        steps:
          - script: |
              INGRESS_IP="4.158.73.97"
              REPORT_DIR="$(Build.SourcesDirectory)/zap-reports"
              mkdir -p "${REPORT_DIR}"

              for APP in python nodejs dotnet; do
                TARGET="http://${INGRESS_IP}/${APP}/"
                echo "=== ZAP baseline scan: ${TARGET} ==="

                docker run --rm \
                  -v "${REPORT_DIR}:/zap/wrk:rw" \
                  ghcr.io/zaproxy/zaproxy:stable \
                  zap-baseline.py \
                    -t "${TARGET}" \
                    -r "zap-${APP}.html" \
                    -J "zap-${APP}.json" \
                    -I \
                  2>&1 | tee "${REPORT_DIR}/zap-${APP}-output.txt" || true

                echo "Scan complete for ${APP}"
              done

              echo "=== ZAP scans finished — check artifacts for findings ==="
            displayName: "Run ZAP baseline scan — python, nodejs, dotnet"

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: "$(Build.SourcesDirectory)/zap-reports"
              artifactName: "dast-zap-results"
